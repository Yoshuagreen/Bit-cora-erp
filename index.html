<script>
'use strict';

/* =========================================================================
   GLOBAL ERROR HANDLING (never fail silently into a blank page)
   ========================================================================= */
function showFatalError(err) {
  console.error(err);
  const el = document.getElementById('fatal-error');
  const isFileProtocol = location.protocol === 'file:';
  el.classList.remove('hidden');
  el.innerHTML = `
    <div class="max-w-lg mx-auto font-sans">
      <h1 class="text-lg font-bold text-rose-600 mb-2">No se pudo iniciar la aplicación</h1>
      <p class="text-sm text-gray-600 mb-3">${isFileProtocol
        ? 'Este archivo se abrió directamente desde el disco (file://). Muchos navegadores bloquean IndexedDB en ese modo, así que la app no puede guardar datos. Sírvelo con un servidor local o publícalo en GitHub Pages (ver README.md).'
        : 'Ocurrió un error inesperado al cargar los datos locales.'}</p>
      <pre class="text-[11px] bg-gray-100 rounded-lg p-3 overflow-x-auto text-gray-500">${esc(err && err.message ? err.message : String(err))}</pre>
    </div>`;
}
window.addEventListener('error', (e) => { if (!document.getElementById('view-root')) showFatalError(e.error || e.message); });
window.addEventListener('unhandledrejection', (e) => { if (!document.getElementById('view-root')) showFatalError(e.reason); });

/* =========================================================================
   DATABASE (Dexie / IndexedDB)
   ========================================================================= */
const db = new Dexie('BitacoraERP');
db.version(1).stores({
  products: '++id, sku, name, category',
  warehouses: '++id, name',
  stock: '++id, productId, warehouseId',
  movements: '++id, date, type, productId',
  sales: '++id, date',
  transactions: '++id, date, type',
  settings: 'key',
});

/* =========================================================================
   HELPERS
   ========================================================================= */
const uid = () => Math.random().toString(36).slice(2, 10);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = (n) => `$${Number(n || 0).toFixed(2)}`;
const fmtDate = (iso) => new Date(iso).toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
const fmtMonth = (iso) => { const d = new Date(iso); return d.toLocaleDateString('es-ES', { month: 'short', year: '2-digit' }); };
const monthKey = (iso) => iso.slice(0, 7);
const todayISO = () => new Date().toISOString();
const daysAgoISO = (n) => { const d = new Date(); d.setDate(d.getDate() - n); return d.toISOString(); };
const PAY_METHODS = ['efectivo', 'tarjeta', 'transferencia'];
const PAY_LABEL = { efectivo: 'Efectivo', tarjeta: 'Tarjeta', transferencia: 'Transferencia' };
const PAY_COLOR = { efectivo: '#017E84', tarjeta: '#714B67', transferencia: '#B58900' };
const EXPENSE_CATS = ['Compra de mercadería', 'Alquiler', 'Servicios', 'Sueldos', 'Marketing', 'Otro'];

function icon(name, cls = 'w-4 h-4') { return `<i data-lucide="${name}" class="${cls}"></i>`; }
function refreshIcons() { try { lucide.createIcons(); } catch (e) {} }

let toastTimer;
function toast(msg, kind = 'ok') {
  const holder = document.getElementById('toast-container');
  const colors = { ok: 'bg-odoo-dark', warn: 'bg-amber-600', err: 'bg-rose-600' };
  const el = document.createElement('div');
  el.className = `toast-in ${colors[kind] || colors.ok} text-white text-xs font-medium px-4 py-2.5 rounded-lg shadow-lg flex items-center gap-2`;
  el.innerHTML = `${icon(kind === 'err' ? 'alert-circle' : kind === 'warn' ? 'alert-triangle' : 'check-circle-2', 'w-4 h-4')}<span>${esc(msg)}</span>`;
  holder.appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity .3s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2600);
}

/* =========================================================================
   STATE (in-memory mirror of Dexie tables — persisted through on mutation)
   ========================================================================= */
let state = {
  products: [], warehouses: [], stock: [], movements: [], sales: [], transactions: [],
  settings: { taxRate: 18 },
  view: 'dashboard',
  pos: { search: '', category: 'todas', cart: [], warehouseId: null },
  inv: { search: '', showForm: false, editing: null, form: emptyProductForm(), transferFor: null },
  acct: { filter: 'todos', showForm: false },
  dash: { },
  loaded: false,
};
function emptyProductForm() { return { sku: '', name: '', category: '', cost: '', price: '', minStock: '' }; }

/* ---------- persistence (full-table overwrite; fine at prototype scale) --- */
async function persist(table) {
  await db[table].clear();
  await db[table].bulkPut(state[table]);
}
async function persistSetting(key, value) {
  state.settings[key] = value;
  await db.settings.put({ key, value });
}

/* =========================================================================
   DERIVED DATA HELPERS
   ========================================================================= */
function warehouseName(id) { const w = state.warehouses.find((x) => x.id === id); return w ? w.name : '—'; }
function stockFor(productId, warehouseId) {
  const s = state.stock.find((x) => x.productId === productId && x.warehouseId === warehouseId);
  return s ? s.qty : 0;
}
function totalStock(productId) {
  return state.stock.filter((x) => x.productId === productId).reduce((s, x) => s + x.qty, 0);
}
function setStock(productId, warehouseId, qty) {
  let row = state.stock.find((x) => x.productId === productId && x.warehouseId === warehouseId);
  if (row) row.qty = qty;
  else state.stock.push({ id: uid(), productId, warehouseId, qty });
}
function adjustStock(productId, warehouseId, delta) {
  const current = stockFor(productId, warehouseId);
  setStock(productId, warehouseId, Math.max(0, current + delta));
}
function lowStockProducts() {
  return state.products.filter((p) => totalStock(p.id) < p.minStock);
}
function categories() { return Array.from(new Set(state.products.map((p) => p.category))).filter(Boolean).sort(); }

function cartLines() {
  return state.pos.cart.map((i) => {
    const p = state.products.find((pp) => pp.id === i.productId);
    return p ? { ...i, product: p, lineTotal: p.price * i.qty } : null;
  }).filter(Boolean);
}
function cartSubtotal() { return cartLines().reduce((s, l) => s + l.lineTotal, 0); }
function cartTax() { return cartSubtotal() * (Number(state.settings.taxRate) / 100); }
function cartTotal() { return cartSubtotal() + cartTax(); }

function salesInMonth(key) { return state.sales.filter((s) => monthKey(s.date) === key); }
function allTxByType(type) { return state.transactions.filter((t) => t.type === type); }

function pgTotals(salesArr, expenseArr) {
  const revenue = salesArr.reduce((s, x) => s + x.total, 0);
  const cogs = salesArr.reduce((s, x) => s + x.items.reduce((a, it) => a + it.cost * it.qty, 0), 0);
  const grossMargin = revenue - cogs;
  const opex = expenseArr.reduce((s, x) => s + x.amount, 0);
  const netProfit = grossMargin - opex;
  return { revenue, cogs, grossMargin, opex, netProfit };
}

/* =========================================================================
   SEED DATA
   ========================================================================= */
async function seedIfEmpty() {
  const count = await db.products.count();
  if (count > 0) return false;

  const warehouses = [
    { id: uid(), name: 'Almacén Principal' },
    { id: uid(), name: 'Tienda / Exhibición' },
  ];
  const [WH_MAIN, WH_SHOP] = warehouses.map((w) => w.id);

  const products = [
    { id: uid(), sku: 'ABR-ARZ-1K', name: 'Arroz Extra 1kg', category: 'Abarrotes', cost: 2.50, price: 3.90, minStock: 20 },
    { id: uid(), sku: 'ABR-ACE-1L', name: 'Aceite Vegetal 1L', category: 'Abarrotes', cost: 5.20, price: 7.50, minStock: 15 },
    { id: uid(), sku: 'ABR-CAF-100', name: 'Café Instantáneo 100g', category: 'Abarrotes', cost: 6.50, price: 9.90, minStock: 8 },
    { id: uid(), sku: 'LIM-DET-1K', name: 'Detergente 1kg', category: 'Limpieza', cost: 4.00, price: 6.20, minStock: 10 },
    { id: uid(), sku: 'LIM-PAP-X4', name: 'Papel Higiénico x4', category: 'Limpieza', cost: 3.10, price: 4.80, minStock: 12 },
    { id: uid(), sku: 'BEB-GAS-15', name: 'Gaseosa 1.5L', category: 'Bebidas', cost: 2.80, price: 4.50, minStock: 24 },
    { id: uid(), sku: 'BEB-AGU-625', name: 'Agua Mineral 625ml', category: 'Bebidas', cost: 0.80, price: 1.50, minStock: 30 },
    { id: uid(), sku: 'SNK-GAL-SUR', name: 'Galletas Surtidas', category: 'Snacks', cost: 1.20, price: 2.20, minStock: 20 },
  ];

  const stockSeed = [
    [products[0].id, 60, 15], [products[1].id, 40, 8], [products[2].id, 5, 2],
    [products[3].id, 22, 6], [products[4].id, 30, 10], [products[5].id, 70, 20],
    [products[6].id, 90, 25], [products[7].id, 10, 6],
  ];
  const stock = [];
  stockSeed.forEach(([pid, main, shop]) => {
    stock.push({ id: uid(), productId: pid, warehouseId: WH_MAIN, qty: main });
    stock.push({ id: uid(), productId: pid, warehouseId: WH_SHOP, qty: shop });
  });

  const transactions = [];
  const sales = [];
  const movements = [];

  const expenseSeed = [
    { days: 40, category: 'Alquiler', desc: 'Alquiler de local — mes anterior', amount: 800, method: 'transferencia' },
    { days: 33, category: 'Servicios', desc: 'Pago de luz y agua', amount: 145.30, method: 'tarjeta' },
    { days: 12, category: 'Compra de mercadería', desc: 'Reposición de inventario — proveedor Andina', amount: 520, method: 'transferencia' },
    { days: 9, category: 'Alquiler', desc: 'Alquiler de local — mes actual', amount: 800, method: 'transferencia' },
    { days: 4, category: 'Marketing', desc: 'Impresión de volantes promocionales', amount: 60, method: 'efectivo' },
  ];
  expenseSeed.forEach((e) => {
    transactions.push({ id: uid(), date: daysAgoISO(e.days), type: 'expense', category: e.category, description: e.desc, amount: e.amount, paymentMethod: e.method, saleId: null });
  });

  const saleSeed = [
    { days: 35, method: 'efectivo', wh: WH_SHOP, items: [[0, 5], [5, 4], [6, 6]] },
    { days: 28, method: 'tarjeta', wh: WH_SHOP, items: [[1, 2], [3, 1]] },
    { days: 20, method: 'efectivo', wh: WH_MAIN, items: [[2, 1], [7, 3]] },
    { days: 15, method: 'transferencia', wh: WH_SHOP, items: [[4, 2], [5, 2]] },
    { days: 6, method: 'tarjeta', wh: WH_SHOP, items: [[0, 3], [6, 4], [1, 1]] },
    { days: 2, method: 'efectivo', wh: WH_MAIN, items: [[3, 2], [7, 2]] },
  ];
  saleSeed.forEach((s) => {
    const date = daysAgoISO(s.days);
    const items = s.items.map(([idx, qty]) => {
      const p = products[idx];
      return { productId: p.id, name: p.name, sku: p.sku, qty, price: p.price, cost: p.cost };
    });
    const subtotal = items.reduce((sum, it) => sum + it.price * it.qty, 0);
    const tax = subtotal * 0.18;
    const total = subtotal + tax;
    const saleId = uid();
    sales.push({ id: saleId, date, items, subtotal, tax, taxRate: 18, total, paymentMethod: s.method, warehouseId: s.wh });
    transactions.push({ id: uid(), date, type: 'income', category: 'Venta POS', description: `Venta #${saleId.slice(0, 6)}`, amount: total, paymentMethod: s.method, saleId });
    items.forEach((it) => {
      const row = stock.find((x) => x.productId === it.productId && x.warehouseId === s.wh);
      if (row) row.qty = Math.max(0, row.qty - it.qty);
      movements.push({ id: uid(), date, type: 'venta', productId: it.productId, fromWarehouseId: s.wh, toWarehouseId: null, qty: it.qty, note: `Venta #${saleId.slice(0, 6)}` });
    });
  });

  await db.warehouses.bulkPut(warehouses);
  await db.products.bulkPut(products);
  await db.stock.bulkPut(stock);
  await db.transactions.bulkPut(transactions);
  await db.sales.bulkPut(sales);
  await db.movements.bulkPut(movements);
  await db.settings.put({ key: 'taxRate', value: 18 });

  return true;
}

async function loadAll() {
  const [products, warehouses, stock, movements, sales, transactions, settingsRows] = await Promise.all([
    db.products.toArray(), db.warehouses.toArray(), db.stock.toArray(), db.movements.toArray(),
    db.sales.toArray(), db.transactions.toArray(), db.settings.toArray(),
  ]);
  state.products = products; state.warehouses = warehouses; state.stock = stock;
  state.movements = movements; state.sales = sales.sort((a, b) => new Date(b.date) - new Date(a.date));
  state.transactions = transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
  settingsRows.forEach((r) => { state.settings[r.key] = r.value; });
  if (!state.pos.warehouseId && warehouses[0]) state.pos.warehouseId = warehouses[0].id;
  state.loaded = true;
}

  document.getElementById('btn-install').addEventListener('click', doInstall);

function navItemHTML(n) {
  const active = state.view === n.id;
  return `<button data-action="nav" data-view="${n.id}" class="nav-link ${active ? 'active' : ''} flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13px] font-medium text-white/70 hover:bg-white/5 hover:text-white transition">

  </button>`;
}
function bottomNavItemHTML(n) {
  const active = state.view === n.id;
  return `<button data-action="nav" data-view="${n.id}" class="bottom-nav-link ${active ? 'active' : ''} flex flex-col items-center gap-1 py-2.5">
    ${icon(n.icon, 'w-5 h-5')}
    <span class="text-[10px] font-mono uppercase tracking-wide">${n.short}</span>
  </button>`;
}
function tickClock() {
  const el = document.getElementById('header-clock');
  if (!el) return;
  el.textContent = new Date().toLocaleString('es-ES', { weekday: 'short', day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
  setTimeout(tickClock, 30000);
}
const VIEW_META = {
  dashboard: ['Dashboard de Pérdidas y Ganancias', 'Resumen financiero del negocio'],
  pos: ['Punto de Venta', 'Registra ventas y cobra en caja'],
  inventory: ['Inventario', 'Productos, stock y almacenes'],
  accounting: ['Contabilidad', 'Libro diario de ingresos y gastos'],
};
function setView(v) {
  state.view = v;
  document.querySelectorAll('.nav-link').forEach((b) => b.classList.toggle('active', b.dataset.view === v));
  const [title, sub] = VIEW_META[v];
  document.getElementById('view-title').textContent = title;
  document.getElementById('view-sub').textContent = sub;
  renderView();
}
function renderView() {
  const root = document.getElementById('view-root');
  root.classList.remove('fade-in'); void root.offsetWidth; root.classList.add('fade-in');
  if (state.view === 'dashboard') root.innerHTML = dashboardHTML();
  else if (state.view === 'pos') root.innerHTML = posHTML();

function renderCharts() {
  const barCanvas = document.getElementById('chart-bar');
  const donutCanvas = document.getElementById('chart-donut');
  if (!barCanvas || !donutCanvas) return;

  const keys = new Set();
  state.sales.forEach((s) => keys.add(monthKey(s.date)));
  state.transactions.filter((t) => t.type === 'expense').forEach((t) => keys.add(monthKey(t.date)));
  const months = Array.from(keys).sort();
  const labels = months.map((k) => { const [y, m] = k.split('-'); return fmtMonth(`${y}-${m}-01`); });
  const incomeData = months.map((k) => salesInMonth(k).reduce((s, x) => s + x.total, 0));
  const expenseData = months.map((k) => state.transactions.filter((t) => t.type === 'expense' && monthKey(t.date) === k).reduce((s, x) => s + x.amount, 0));

  if (chartBar) chartBar.destroy();
  chartBar = new Chart(barCanvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Ingresos', data: incomeData, backgroundColor: '#017E84', borderRadius: 4, maxBarThickness: 28 },
        { label: 'Gastos', data: expenseData, backgroundColor: '#C9A227', borderRadius: 4, maxBarThickness: 28 },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } } },
      scales: { y: { beginAtZero: true, ticks: { callback: (v) => '$' + v } }, x: { grid: { display: false } } },
    },
  });

  const byMethod = {};
  state.sales.forEach((s) => { byMethod[s.paymentMethod] = (byMethod[s.paymentMethod] || 0) + s.total; });
  const methods = Object.keys(byMethod);
  if (chartDonut) chartDonut.destroy();
  chartDonut = new Chart(donutCanvas, {
    type: 'doughnut',
    data: {
      labels: methods.map((m) => PAY_LABEL[m] || m),
      datasets: [{ data: methods.map((m) => byMethod[m]), backgroundColor: methods.map((m) => PAY_COLOR[m] || '#999'), borderWidth: 2, borderColor: '#fff' }],
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } } } },
  });
}

async function confirmCheckout() {
  const lines = cartLines();
  const wid = state.pos.warehouseId;
  const shortage = lines.find((l) => l.qty > stockFor(l.productId, wid));
  if (shortage) { toast(`Stock insuficiente en "${warehouseName(wid)}" para ${shortage.product.name}`, 'err'); return; }

  const method = state.pos._method || 'efectivo';
  const date = todayISO();
  const saleId = uid();
  const subtotal = cartSubtotal(), tax = cartTax(), total = cartTotal();
  const sale = {
    id: saleId, date, warehouseId: wid, paymentMethod: method, subtotal, tax, taxRate: Number(state.settings.taxRate), total,
    items: lines.map((l) => ({ productId: l.product.id, name: l.product.name, sku: l.product.sku, qty: l.qty, price: l.product.price, cost: l.product.cost })),
  };
  state.sales.unshift(sale);
  lines.forEach((l) => {
    adjustStock(l.product.id, wid, -l.qty);
    state.movements.push({ id: uid(), date, type: 'venta', productId: l.product.id, fromWarehouseId: wid, toWarehouseId: null, qty: l.qty, note: `Venta #${saleId.slice(0, 6)}` });
  });
  state.transactions.unshift({ id: uid(), date, type: 'income', category: 'Venta POS', description: `Venta #${saleId.slice(0, 6)}`, amount: total, paymentMethod: method, saleId });

  await Promise.all([persist('sales'), persist('stock'), persist('movements'), persist('transactions')]);

  closeModal();
  toast('Venta registrada correctamente');
  showReceipt(sale);
  state.pos.cart = [];
  renderView();
}

async function saveProduct() {

async function saveTransfer() {
  const pid = document.getElementById('tr-product').value;
  const fromId = document.getElementById('tr-from').value;
  const toId = document.getElementById('tr-to').value;
  const qty = Number(document.getElementById('tr-qty').value) || 0;
  if (fromId === toId) { toast('Elige almacenes distintos', 'warn'); return; }
  if (qty <= 0) { toast('Ingresa una cantidad válida', 'warn'); return; }
  if (qty > stockFor(pid, fromId)) { toast('Stock insuficiente en el almacén de origen', 'err'); return; }
  adjustStock(pid, fromId, -qty);
  adjustStock(pid, toId, qty);
  const date = todayISO();
  state.movements.unshift({ id: uid(), date, type: 'transferencia', productId: pid, fromWarehouseId: fromId, toWarehouseId: toId, qty, note: 'Transferencia manual' });
  await Promise.all([persist('stock'), persist('movements')]);
  closeModal(); toast('Transferencia de stock exitosa'); renderView();
}

async function exportData() {
  const payload = {
    exportedAt: todayISO(),
    products: state.products, warehouses: state.warehouses, stock: state.stock,
    movements: state.movements, sales: state.sales, transactions: state.transactions, settings: state.settings,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `bitacora-backup-${todayISO().slice(0, 10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Datos exportados');
}
async function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    ['products', 'warehouses', 'stock', 'movements', 'sales', 'transactions'].forEach((k) => { state[k] = Array.isArray(data[k]) ? data[k] : []; });
    if (data.settings) state.settings = { ...state.settings, ...data.settings };
    await Promise.all([
      persist('products'), persist('warehouses'), persist('stock'),
      persist('movements'), persist('sales'), persist('transactions'),
      db.settings.clear().then(() => db.settings.bulkPut(Object.entries(state.settings).map(([key, value]) => ({ key, value })))),
    ]);
    if (!state.pos.warehouseId && state.warehouses[0]) state.pos.warehouseId = state.warehouses[0].id;
    toast('Datos importados correctamente');
    setView(state.view);
  } catch (err) {
    console.error(err);
    toast('El archivo no es válido', 'err');
  } finally {
    e.target.value = '';
  }
}

document.addEventListener('click', (e) => {
  const t = e.target.closest('[data-action]');
  if (!t) return;
  const action = t.dataset.action, id = t.dataset.id;
  switch (action) {
    case 'nav': setView(t.dataset.view); break;
    case 'add-cart': addToCart(id); break;
    case 'cart-inc': cartDelta(id, 1); break;
    case 'cart-dec': cartDelta(id, -1); break;
    case 'cart-remove': cartRemove(id); break;
    case 'open-checkout': openCheckout(); break;
    case 'pick-payment': pickPayment(t.dataset.method); break;
    case 'confirm-checkout': confirmCheckout(); break;
    case 'print-receipt': window.print(); break;
    case 'close-modal': closeModal(); break;
    case 'open-new-product': openNewProduct(); break;
    case 'open-edit-product': openEditProduct(id); break;
    case 'delete-product': deleteProduct(id); break;
    case 'save-product': saveProduct(); break;
    case 'open-transfer': openTransfer(); break;
    case 'save-transfer': saveTransfer(); break;
    case 'acct-filter': state.acct.filter = t.dataset.filter; renderView(); break;
    case 'open-expense': openExpenseModal(); break;
    case 'save-expense': saveExpense(); break;
    case 'open-mobile-cart': openMobileCart(); break;
    case 'open-more-sheet': openMoreSheet(); break;
    case 'export-data': closeModal(); exportData(); break;
    case 'trigger-import': closeModal(); document.getElementById('import-file').click(); break;
    case 'mobile-install': closeModal(); doInstall(); break;
  }
});

document.addEventListener('input', (e) => {
  const id = e.target.id;
  if (id === 'pos-search') { state.pos.search = e.target.value; refreshPosGrid(); }
  else if (id === 'inv-search') {
    state.inv.search = e.target.value;
    const q = state.inv.search.toLowerCase();
    const list = state.products.filter((p) => p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
    const tbody = document.getElementById('inv-tbody'); if (tbody) tbody.innerHTML = inventoryRowsHTML(list);
    const cards = document.getElementById('inv-cards'); if (cards) cards.innerHTML = inventoryCardsHTML(list);
    refreshIcons();
  }
  else if (id === 'pos-taxrate') { persistSetting('taxRate', Number(e.target.value) || 0).then(() => { renderView(); if (isMobileCartOpen()) openMobileCart(); }); }
  else if (id && id.startsWith('pf-')) { state.inv.form[id.slice(3)] = e.target.value; }
});
document.addEventListener('change', (e) => {
  const id = e.target.id;
  if (id === 'pos-category') { state.pos.category = e.target.value; refreshPosGrid(); }
  else if (id === 'pos-warehouse') { state.pos.warehouseId = e.target.value; renderView(); }
});

/* =========================================================================
   PWA: SERVICE WORKER + INSTALL PROMPT
   ========================================================================= */
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('btn-install');
  if (btn) btn.classList.remove('hidden');
});
window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  const btn = document.getElementById('btn-install');
  if (btn) btn.classList.add('hidden');
  toast('Bitácora instalada. Ya puedes abrirla sin conexión.');
});
function doInstall() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.finally(() => {
    deferredInstallPrompt = null;
    const btn = document.getElementById('btn-install');
    if (btn) btn.classList.add('hidden');
  });
}
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch((err) => console.warn('SW registration failed:', err));
  });
}

/* =========================================================================
   BOOT
   ========================================================================= */
(async function boot() {
  try {
    const seeded = await seedIfEmpty();
    await loadAll();
    renderShell();
    setView('dashboard');
    if (seeded) toast('Datos de demostración cargados');
  } catch (err) {
    showFatalError(err);
  }
})();
</script>
